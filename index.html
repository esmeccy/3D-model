<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <title>Model-viewer Demo</title>
</head>
<body>
    <div class="container">
        <div class="content">
        <h1>Human Eyeball</h1>
        <p class="desc">
        Explore the 3D model and inspect key parts of the eye.
        </p>
        </div>

        <model-viewer
        src="./src/model/eyeball.glb"
        alt="3D eyeball"
        camera-controls
        auto-rotate
        camera-orbit="15deg 25deg 2m">

        <button
            class="hotspot"
            slot="hotspot-1"
            data-position="0m 0.05m 0.1m"
            data-normal="0m 0m 1m">
            Cornea
        </button>

        <button
            class="hotspot"
            slot="hotspot-2"
            data-position="0m 0m 0m"
            data-normal="0m 1m 0m">
            Iris
        </button>

        <button
            class="hotspot"
            slot="hotspot-3"
            data-position="0m -0.05m -0.08m"
            data-normal="0m 0m -1m">
            Retina
        </button>
        </model-viewer>
    </div>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
</body>
</html>
